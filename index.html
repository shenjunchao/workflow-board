<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自定义工作流表</title>
    <link rel="stylesheet" href="./workflow-board.css" />
  </head>
  <body>

    <!-- 加载中弹窗 -->
    <div id="loadingModal" class="modal-overlay" style="display: none; z-index: 10000;">
      <div class="modal-box" style="width: auto; display: flex; align-items: center; gap: 16px; padding: 16px 24px;">
        <div class="spinner"></div>
        <span id="loadingMessage" style="font-size: 14px; font-weight: 500;">AI 思考中...</span>
      </div>
    </div>

    <!-- 视图 1：主控制台 Dashboard -->
    <div id="dashboardView" class="view-container active">
      <aside class="dash-sidebar">
        <div class="user-avatar" title="用户账号">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="help-icon" title="帮助与设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </div>
      </aside>
      
      <main class="dash-main">
        <header class="dash-header-top">
          <div class="auth-bar">
            <span id="authStatus" class="auth-status">本地模式</span>
            <button id="loginOpenBtn" class="ghost-button" type="button">登录 / 注册</button>
            <button id="logoutBtn" class="ghost-button" type="button" hidden>退出</button>
          </div>
        </header>

        <div id="dashboardContent">
          <!-- 项目卡片与分类组由 JS 动态生成 -->
        </div>
      </main>
    </div>

    <!-- 视图 2：编辑器 Editor -->
    <div id="editorView" class="view-container app-shell">
      <header class="topbar">
        <div class="brand">
          <!-- 返回主页按钮 -->
          <button class="back-btn" id="backToDashBtn" title="返回项目主页">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 5"></polyline>
            </svg>
          </button>
          <span class="brand-mark" aria-hidden="true"></span>
          <div style="display: flex; flex-direction: column;">
            
            <!-- 顶部项目分类组保留自定义输入组件 -->
            <div style="position: relative;">
              <input class="project-category-input" id="projectCategoryInput" type="text" placeholder="项目分类 (如: 个人项目)" aria-label="项目分类组" autocomplete="off" />
              <div id="projectCategoryDropdown" class="combo-dropdown" style="width: 140px;"></div>
            </div>

            <input class="workflow-title-input" id="workflowTitleInput" type="text" value="自定义工作流表" aria-label="工作流名称" />
          </div>
        </div>
        <div class="top-actions">
          <!-- 新增 AI 生成按钮 -->
          <button class="ai-button" id="aiGenerateBtn" type="button" title="使用 AI 一键生成完整的工作流">✨ 智能生成</button>
          <button class="ghost-button" id="apiConfigBtn" type="button" title="配置 Gemini API Key">配置 API</button>
          <button class="ghost-button" id="exportWorkspaceBtn" type="button">导出文件</button>
          <button class="ghost-button" id="importWorkspaceBtn" type="button">导入覆盖</button>
          <input id="importWorkspaceInput" type="file" accept="application/json,.json" hidden />
          <button class="icon-button" id="resetBtn" type="button" title="恢复当前示例">↺</button>
          <button class="ghost-button" id="addNodeBtn" type="button">新增节点</button>
          <button class="primary-button" id="saveBtn" type="button">保存</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <div class="rail">
            <button class="rail-button active" title="工作流" aria-label="工作流">
              <span></span>
            </button>
            <button class="rail-button" id="newWorkspaceBtn" title="新建空白工作区" aria-label="新建空白工作区">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin: auto; display: block;">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
          <section class="list-panel">
            <div class="panel-heading">
              <h2>项目文件夹</h2>
              <span id="nodeCount">0</span>
            </div>
            <label class="search-box">
              <span aria-hidden="true">⌕</span>
              <input id="searchInput" type="search" placeholder="搜索名称" autocomplete="off" />
            </label>
            <div class="node-list-container" id="nodeListContainer">
              <ol class="node-list" id="nodeList"></ol>
            </div>
          </section>
        </aside>

        <section class="canvas-section">
          <div class="canvas-toolbar">
            <div class="zoom-group" aria-label="缩放控制">
              <button id="zoomOutBtn" type="button">−</button>
              <span id="zoomLabel">100%</span>
              <button id="zoomInBtn" type="button">＋</button>
            </div>
            <button id="fitBtn" type="button">自动布局</button>
            <button id="connectEdgeBtn" type="button">新增连线</button>
            <button id="deleteEdgeBtn" type="button" disabled>删除连线</button>
            <div class="connection-hint" id="connectionHint">Shift框选 | Ctrl拖拽复制 | Ctrl+Z撤销</div>
          </div>
          <div class="canvas-viewport" id="canvasViewport">
            <div class="canvas-grid" id="canvasGrid">
              <svg class="edge-layer" id="edgeLayer" aria-hidden="true"></svg>
              <div class="node-layer" id="nodeLayer"></div>
            </div>
            <div class="selection-box" id="selectionBox" hidden></div>
          </div>
          <div class="minimap" aria-hidden="true">
            <svg id="miniMapSvg" viewBox="0 0 220 120"></svg>
            <div class="mini-tools">
              <button type="button" id="miniPlus" title="放大">＋</button>
              <button type="button" id="miniMinus" title="缩小">−</button>
            </div>
          </div>
        </section>

        <aside class="detail-panel" id="detailPanel">
          <div class="detail-header">
            <div>
              <p class="eyebrow">节点信息</p>
              <h2 id="detailTitle">选择节点</h2>
            </div>
          </div>

          <form class="detail-form" id="detailForm">
            <label>
              节点名称
              <input id="nodeTitleInput" name="title" type="text" />
            </label>
            
            <div class="field-row">
              <label style="flex: 1;">
                分类组
                <!-- === 核心修改：右侧节点分类组使用原生 Select 下拉菜单 === -->
                <select id="nodeCategorySelect" name="category"></select>
              </label>
              <label style="flex: 0 0 64px;">
                节点颜色
                <input id="nodeColorInput" name="color" type="color" value="#ffffff" />
              </label>
            </div>

            <label>
              <div style="display:flex; justify-content: space-between; align-items: center;">
                <span>备注</span>
                <button type="button" id="aiDescBtn" class="label-action-btn" title="根据当前节点名称与分类，AI自动编写执行说明">✨ 智能补全</button>
              </div>
              <textarea id="nodeDescriptionInput" name="description" rows="4"></textarea>
            </label>

            <!-- 超链接设置区域 -->
            <div class="field-row">
              <label>
                链接文字
                <input id="nodeLinkTextInput" name="linkText" type="text" placeholder="例如：点击下载扩展插件" />
              </label>
              <label>
                链接地址
                <input id="nodeLinkUrlInput" name="linkUrl" type="url" placeholder="https://" />
              </label>
            </div>

            <div class="image-block">
              <div class="block-title">节点图片</div>
              <div class="image-preview" id="imagePreview">
                <span>未添加图片</span>
              </div>
              <div class="image-actions">
                <label class="upload-button" for="nodeImageInput">添加图片</label>
                <input id="nodeImageInput" name="image" type="file" accept="image/*" />
                <button class="ghost-button" id="removeImageBtn" type="button">移除图片</button>
              </div>
            </div>

            <button class="danger-button" id="deleteNodeBtn" type="button" style="margin-top: 12px;">删除选中的节点</button>
          </form>
        </aside>
      </main>

      <footer class="footer">
        <span class="live-dot"></span>
        <span id="footerText">本地工作流已就绪</span>
      </footer>
    </div>

    <!-- 自定义确认弹窗，用于避开 iframe 对 window.confirm 的拦截 -->
    <div id="confirmModal" class="modal-overlay" style="display: none;">
      <div class="modal-box">
        <h3 id="confirmTitle">确认操作</h3>
        <p id="confirmMessage"></p>
        <input type="text" id="confirmInput" style="display: none; width: 100%; margin-bottom: 16px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 6px; box-sizing: border-box; outline: none;" />
        <div class="modal-actions">
          <button id="confirmCancelBtn" class="ghost-button">取消</button>
          <button id="confirmOkBtn" class="primary-button" style="width: auto; margin: 0;">确认</button>
        </div>
      </div>
    </div>

    <div id="authModal" class="modal-overlay" style="display: none;">
      <div class="modal-box auth-modal-box">
        <h3>账号登录</h3>
        <p>登录后，工作流会保存到 Supabase 云端，并按账号隔离。</p>
        <label class="auth-field">
          邮箱
          <input id="authEmailInput" type="email" autocomplete="email" placeholder="name@example.com" />
        </label>
        <label class="auth-field">
          密码
          <input id="authPasswordInput" type="password" autocomplete="current-password" placeholder="至少 6 位" />
        </label>
        <div class="modal-actions">
          <button id="authCancelBtn" class="ghost-button" type="button">取消</button>
          <button id="authRegisterBtn" class="ghost-button" type="button">注册</button>
          <button id="authLoginBtn" class="primary-button" type="button" style="width: auto; margin: 0;">登录</button>
        </div>
      </div>
    </div>

    <!-- 图片大图预览弹窗 -->
    <div id="imagePreviewModal" class="modal-overlay" style="display: none; z-index: 10002; cursor: zoom-out;" title="点击关闭预览">
      <img id="previewModalImg" src="" style="max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 16px 40px rgba(0,0,0,0.5); object-fit: contain; cursor: default;" onclick="event.stopPropagation()" />
      <button style="position: absolute; top: 24px; right: 24px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 24px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;" onclick="document.getElementById('imagePreviewModal').style.display='none'">×</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./workflow-board.js"></script>
  </body>
</html>
